<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="Jane Choi · Hobbies">
    <meta property="og:description" content="My Personal Portfolio">
    <meta property="og:url" content="{{ url }}">
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon">
    <title>Hobbies · Jane Choi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/hobbies.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

<nav>
    <a href="/jane" class="nav-back">&lt;&lt;BACK</a>
    <div class="nav-title">JANE CHOI</div>
    <div></div>
</nav>

<nav class="game-nav">
    <a href="/jane" class="game-nav-link">HOME</a>
    <a href="/jane/hobbies" class="game-nav-link">HOBBIES</a>
    <a href="/timeline" class="game-nav-link">TIMELINE</a>
</nav>

<div class="page-header">
    <h1>HOBBIES</h1>
    <p>Things I love outside of work</p>
</div>

<div class="hobbies-grid">
    {% for hobby in hobbies %}
    <div class="hobby-card" data-index="{{ loop.index0 }}">
        <img class="hobby-card-image" src="{{ url_for('static', filename=hobby.image) }}" alt="{{ hobby.name }}">
        <div class="hobby-card-body">
            <span class="hobby-card-tag">HOBBY</span>
            <h3 class="hobby-card-name">{{ hobby.name }}</h3>
            {% if hobby.description %}
            <p class="hobby-card-desc">{{ hobby.description }}</p>
            {% endif %}
        </div>
    </div>
    {% endfor %}
</div>

<div class="page-header">
    <h1>PLACES I'VE VISITED</h1>
</div>

<div id="map" style="width: 90%; max-width: 900px; margin: 0 auto 60px; height: 400px; border-radius: 8px;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const leafletMap = L.map('map').setView([30, -30], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(leafletMap);

    const visitedPlaces = {{ places | tojson }};
    visitedPlaces.forEach(p => {
        L.marker([p.lat, p.lng]).addTo(leafletMap).bindPopup(p.name);
    });
</script>

<!-- Photo popup -->
<div id="hobby-popup-overlay" onclick="closeHobbyPopup()">
    <div id="hobby-popup" onclick="event.stopPropagation()">
        <button class="hobby-popup-close" onclick="closeHobbyPopup()">✕</button>
        <div class="hobby-slider">
            <button class="hobby-slider-btn left" onclick="hobbySlide(-1)">&#8249;</button>
            <img id="hobby-slider-img" src="" alt="">
            <button class="hobby-slider-btn right" onclick="hobbySlide(1)">&#8250;</button>
        </div>
        <div id="hobby-slider-dots"></div>
    </div>
</div>

<script>
    const HOBBY_DATA = {{ hobbies | tojson }};
    let hobbyPhotos = [];
    let hobbyIndex = 0;

    document.querySelectorAll('.hobby-card').forEach(card => {
        card.addEventListener('click', () => {
            const hobby = HOBBY_DATA[card.dataset.index];
            openHobbyPopup(hobby.photos, hobby.name);
        });
    });

    function openHobbyPopup(photos, name) {
        hobbyPhotos = photos;
        hobbyIndex = 0;
        updateHobbySlider();
        document.getElementById('hobby-popup-overlay').classList.add('active');
    }

    function closeHobbyPopup() {
        document.getElementById('hobby-popup-overlay').classList.remove('active');
    }

    function hobbySlide(dir) {
        hobbyIndex = (hobbyIndex + dir + hobbyPhotos.length) % hobbyPhotos.length;
        updateHobbySlider();
    }

    function updateHobbySlider() {
        document.getElementById('hobby-slider-img').src = '/static/' + hobbyPhotos[hobbyIndex];
        const dots = document.getElementById('hobby-slider-dots');
        dots.innerHTML = hobbyPhotos.map((_, i) =>
            `<span class="hobby-dot ${i === hobbyIndex ? 'active' : ''}" onclick="hobbyIndex=${i}; updateHobbySlider()"></span>`
        ).join('');
    }
</script>

</body>
</html>
